# Devise i18n - Português (Brasil)
# Referência: https://github.com/heartcombo/devise/wiki/I18n

pt-BR:
  devise:
    confirmations:
      confirmed: "Seu e-mail foi confirmado com sucesso."
      send_instructions: "Você receberá um e-mail com instruções para confirmar seu endereço em alguns minutos."
