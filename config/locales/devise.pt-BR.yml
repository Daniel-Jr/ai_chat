      send_paranoid_instructions: "Se o seu e-mail existir em nosso banco de dados, você receberá um link de recuperação de senha em breve."
      updated: "Sua senha foi alterada com sucesso. Você já está autenticado."
      updated_not_active: "Sua senha foi alterada com sucesso."
    registrations:
      destroyed: "Até logo! Sua conta foi cancelada com sucesso."
      signed_up: "Bem-vindo(a)! Seu cadastro foi realizado com sucesso."
      signed_up_but_inactive: "Você se cadastrou com sucesso, mas não foi possível entrar porque sua conta ainda não foi ativada."
      signed_up_but_locked: "Você se cadastrou com sucesso, mas não foi possível entrar porque sua conta está bloqueada."
      signed_up_but_unconfirmed: "Uma mensagem com um link de confirmação foi enviada para o seu e-mail. Por favor, siga o link para ativar sua conta."
      update_needs_confirmation: "Sua conta foi atualizada, mas precisamos verificar seu novo e-mail. Por favor, confirme-o clicando no link enviado."
      updated: "Sua conta foi atualizada com sucesso."
      updated_but_not_signed_in: "Sua conta foi atualizada, mas como sua senha foi alterada, é necessário entrar novamente."
    sessions:
      signed_in: "Autenticado com sucesso."
      signed_out: "Saída realizada com sucesso."
      already_signed_out: "Saída realizada com sucesso."
    unlocks:
      send_instructions: "Você receberá um e-mail com instruções para desbloquear sua conta em alguns minutos."
      send_paranoid_instructions: "Se sua conta existir, você receberá instruções de desbloqueio por e-mail em breve."
      unlocked: "Sua conta foi desbloqueada com sucesso. Por favor, entre para continuar."

  errors:
    messages:
      already_confirmed: "já foi confirmado, tente entrar"
      confirmation_period_expired: "precisa ser confirmado em %{period}, por favor solicite um novo"
      expired: "expirou, por favor solicite um novo"
      not_found: "não encontrado"
      not_locked: "não estava bloqueado"
      not_saved:
        one: "1 erro impediu este %{resource} de ser salvo:"
        other: "%{count} erros impediram este %{resource} de ser salvo:"
